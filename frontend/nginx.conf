server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routes (/, /workspace) -- without this, refreshing or
    # directly navigating to /workspace would 404, since there's no actual file at that path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same pattern the Vite dev server's proxy uses locally -- the browser only ever talks
    # to nginx, same-origin, which sidesteps CORS entirely and means the frontend build never
    # needs to know the backend's real address.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
