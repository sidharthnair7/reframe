spring.application.name=reframe
server.port=${PORT:8080}

# MongoDB (configured programmatically via MongoConfig to avoid Spring Boot 4.x property deprecation)
# Secrets below have NO fallback default -- this file is safe to commit. Local dev sources real
# values from the gitignored .env via run-local.sh/run-local.ps1; Docker/Render set them as real
# environment variables. Non-secret values (URLs, model names, caps) keep safe defaults.
app.mongodb.uri=${MONGODB_URI}
app.mongodb.database=${MONGODB_DATABASE:reframe}

# Claude API
claude.api.key=${CLAUDE_API_KEY}
claude.api.url=${CLAUDE_API_URL:https://api.anthropic.com/v1/messages}
claude.api.model=${CLAUDE_API_MODEL:claude-haiku-4-5-20251001}

# ElevenLabs (Text-to-Speech)
elevenlabs.api.key=${ELEVENLABS_API_KEY}
elevenlabs.voice.id=${ELEVENLABS_VOICE_ID:nf4MCGNSdM0hxM95ZBQR}

# JWT
application.security.jwt.secret=${JWT_SECRET}

# Frontend CORS origin
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Voyage AI (embeddings for RAG framework retrieval)
voyage.api.key=${VOYAGE_API_KEY}


app.usage.freeTier.brainDumpCapPerMonth=${BRAIN_DUMP_CAP_PER_MONTH:20}
app.usage.freeTier.voiceExchangeCapPerMonth=${VOICE_EXCHANGE_CAP_PER_MONTH:50}
app.usage.freeTier.voiceSpeakCapPerMonth=${VOICE_SPEAK_CAP_PER_MONTH:60}
